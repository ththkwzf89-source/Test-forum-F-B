<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test F&B</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #dbe2ea;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #eaf1ff, #ffffff);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .hero p {
      color: var(--muted);
      max-width: 760px;
      margin-bottom: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 18px 0 26px;
    }

    .search {
      flex: 1 1 320px;
      min-width: 220px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    .button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .button:hover {
      background: var(--accent-hover);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .badge {
      background: #eff6ff;
      color: var(--accent);
      border: 1px solid #cfe0ff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fafcff;
    }

    .link-item a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      word-break: break-word;
    }

    .link-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .open-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff !important;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .open-btn:hover {
      background: var(--accent-hover);
      text-decoration: none;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fbff;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .section-title {
      margin: 8px 0 14px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .hero, .card { padding: 18px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Шаблон для ссылок и таблиц</h1>
      <p>
        Это простой сайт-шаблон, который можно хранить как один HTML-файл.
        Чтобы обновить ссылки, категории или таблицы, достаточно отредактировать данные в блоке <strong>DATA</strong> внизу файла.
      </p>
    </section>

    <div class="toolbar">
      <input id="searchInput" class="search" type="text" placeholder="Поиск по названиям, описанию, ссылкам и таблицам..." />
      <button class="button" id="expandAllBtn">Показать всё</button>
    </div>

    <div id="content"></div>
  </div>

  <script>
    /*
      =========================
      РЕДАКТИРУЙ ДАННЫЕ ЗДЕСЬ
      =========================

      Как обновлять сайт:
      1. Меняй title и description при необходимости.
      2. В sections добавляй новые блоки.
      3. type может быть:
         - "links"  -> блок со ссылками
         - "table"  -> таблица
      4. Для ссылок используй items.
      5. Для таблиц используй columns и rows.
    */

    const DATA = {
      title: "Шаблон сайту",
      description: "Зручний шаблон для зберігання таблиць та файлів",
      sections: [
        {
          type: "links",
          title: "Корисні посилання",
          badge: "Посилання",
          description: "Посилання на корисні файли та таблиці, які можуть знадобитися в роботі",
          items: [
            {
              name: "Таблиця з меню ",
              url: "https://drive.google.com/file/d/1G6i7SBMgyEa63Ez-GmIMhKaHuKgFvSjm/view?usp=drive_link",
              note: "Активне посилання на таблицю з меню "
            },
            {
              name: "Інструкція з промивання кавомашини",
              url: "https://docs.google.com/document/d/1poHQB3u6cKMyEZbQSrVXEpbvf7TQjdAc/edit?usp=drive_link&ouid=108602676762976729118&rtpof=true&sd=true",
              note: "Інструкція з промивання кавомашини на 16 поверсі"
            },
            {
              name: "Графік",
              url: "https://accor-my.sharepoint.com/:x:/r/personal/firas_alzoubi_accor_com/_layouts/15/doc2.aspx?sourcedoc=%7Be59e6716-ef43-4ff7-bb03-4f8406073c43%7D&action=view&wdinitialsession=404c9925-41d3-5a61-e6fb-0da99540e716&wdrldsc=3&wdrldc=1&wdrldr=RefreshingExpiredAccessToken&wdenableroaming=1&wdodb=1&wdlcid=uk-UA&wdorigin=AuthPrompt&wdredirectionreason=Force_SingleStepBoot",
              note: "Актуальне посилання на графік, дійсне до 2028 року"
            }
          ]
        },
        {
          type: "links",
          title: "Рабочие ресурсы",
          badge: "Работа",
          description: "Блок для ссылок на CRM, PMS, таблицы, отчёты, чек-листы и инструкции.",
          items: [
            {
              name: "Отчёт по смене",
              url: "https://example.com/report",
              note: "Замени на свою ссылку"
            },
            {
              name: "Чек-лист открытия",
              url: "https://example.com/opening-checklist",
              note: "Ежедневные задачи"
            }
          ]
        },
        {
          type: "table",
          title: "Список задач",
          badge: "Таблица",
          description: "Пример простой таблицы. Можно использовать для задач, контактов, закупок, дедлайнов и любого учёта.",
          columns: ["Задача", "Статус", "Комментарий"],
          rows: [
            ["Обновить меню", "В процессе", "Проверить цены и фото"],
            ["Проверить остатки", "Новая", "Сделать вечером"],
            ["Подготовить отчёт", "Готово", "Отправлен менеджеру"]
          ]
        },
        {
          type: "table",
          title: "Контакты / подрядчики",
          badge: "Контакты",
          description: "Пример второй таблицы для хранения контактов, поставщиков или сервисных служб.",
          columns: ["Название", "Контакт", "Примечание"],
          rows: [
            ["Поставщик кофе", "+38 (0XX) XXX-XX-XX", "Доставка по вторникам"],
            ["Сервис техники", "+38 (0XX) XXX-XX-XX", "Ремонт кофемашины"],
            ["Прачечная", "+38 (0XX) XXX-XX-XX", "Корпоративный договор"]
          ]
        }
      ]
    };

    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');
    const expandAllBtn = document.getElementById('expandAllBtn');

    document.title = DATA.title;
    document.querySelector('.hero h1').textContent = DATA.title;
    document.querySelector('.hero p').textContent = DATA.description;

    function render() {
      content.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'grid';

      DATA.sections.forEach((section) => {
        const card = document.createElement('section');
        card.className = 'card searchable';
        card.dataset.search = JSON.stringify(section).toLowerCase();

        const header = document.createElement('div');
        header.className = 'card-header';
        header.innerHTML = `
          <div>
            <h2 class="section-title">${section.title}</h2>
            <div class="muted">${section.description || ''}</div>
          </div>
          <div class="badge">${section.badge || section.type}</div>
        `;
        card.appendChild(header);

        if (section.type === 'links') {
          const list = document.createElement('div');
          list.className = 'link-list';

          section.items.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
              <div class="link-row">
                <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.name}</a>
                <a class="open-btn" href="${item.url}" target="_blank" rel="noopener noreferrer">Открыть</a>
              </div>
              <div class="link-note">${item.note || ''}</div>
            `;
            list.appendChild(div);
          });

          card.appendChild(list);
        }

        if (section.type === 'table') {
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap';

          const table = document.createElement('table');
          const thead = document.createElement('thead');
          const tbody = document.createElement('tbody');

          const headRow = document.createElement('tr');
          section.columns.forEach((col) => {
            const th = document.createElement('th');
            th.textContent = col;
            headRow.appendChild(th);
          });
          thead.appendChild(headRow);

          section.rows.forEach((row) => {
            const tr = document.createElement('tr');
            row.forEach((cell) => {
              const td = document.createElement('td');
              td.textContent = cell;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });

          table.appendChild(thead);
          table.appendChild(tbody);
          wrap.appendChild(table);
          card.appendChild(wrap);
        }

        const footer = document.createElement('div');
        footer.className = 'footer-note';
        footer.textContent = 'Этот блок можно менять прямо в коде в разделе DATA.';
        card.appendChild(footer);

        grid.appendChild(card);
      });

      content.appendChild(grid);
    }

    function applySearch() {
      const query = searchInput.value.trim().toLowerCase();
      const cards = document.querySelectorAll('.searchable');

      cards.forEach((card) => {
        const haystack = card.dataset.search || '';
        const match = haystack.includes(query);
        card.classList.toggle('hidden', !match);
      });
    }

    searchInput.addEventListener('input', applySearch);
    expandAllBtn.addEventListener('click', () => {
      searchInput.value = '';
      applySearch();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    render();
  </script>
</body>
</html>
